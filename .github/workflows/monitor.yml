name: Minnesota News Monitor

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *" #enabled
  workflow_dispatch:
    # Also lets you run it manually from the GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository (including seen_stories.json)
      - name: Check out repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser

      # 4. Run the monitor script
      - name: Run news monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python mn_news_monitor.py

      # 5. Commit the updated seen_stories.json back to the repo
      #    so next run knows which stories it already sent
      - name: Save seen stories
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_stories.json
          git diff --cached --quiet || git commit -m "chore: update seen stories [skip ci]"
          git push
